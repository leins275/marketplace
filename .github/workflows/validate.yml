# Static checks on each push to main and every PR: JSON manifests parse, and
# the generated README sections are in sync with the manifests.
name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON manifests
        run: make validate
      - name: Check generated README sections
        run: make docs-check
